<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Student Dashboard{% endblock %}</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            color: #111827;
        }

        a {
            color: inherit;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #111827;
            color: white;
            padding: 24px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .user-info {
            color: #d1d5db;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .menu a {
            display: block;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-radius: 10px;
            color: #e5e7eb;
            text-decoration: none;
        }

        .menu a:hover {
            background: #1f2937;
        }

        .logout {
            margin-top: 30px;
        }

        .logout a {
            color: #93c5fd;
            text-decoration: none;
            font-size: 14px;
        }

        .main {
            margin-left: 260px;
            width: calc(100% - 260px);
        }

        .topbar {
            background: white;
            padding: 22px 34px;
            border-bottom: 1px solid #e5e7eb;
        }

        .topbar h1 {
            margin: 0;
            font-size: 26px;
        }

        .topbar p {
            margin: 6px 0 0;
            color: #6b7280;
        }

        .content {
            padding: 28px 34px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 28px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 30px;
            font-weight: bold;
        }

        .section {
            margin-top: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section h2 {
            margin: 0;
            font-size: 22px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .course-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .course-image {
            height: 150px;
            background: #dbeafe;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
            font-weight: bold;
        }

        .course-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .course-body {
            padding: 20px;
        }

        .course-title {
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .muted {
            color: #6b7280;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            background: #e5e7eb;
            color: #374151;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            margin-right: 5px;
            margin-top: 8px;
        }

        .progress-wrapper {
            background: #e5e7eb;
            border-radius: 999px;
            height: 10px;
            overflow: hidden;
            margin-top: 14px;
        }

        .progress-bar {
            background: #2563eb;
            height: 100%;
        }

        .progress-text {
            margin-top: 8px;
            font-size: 14px;
            color: #374151;
        }

        .button {
            display: inline-block;
            background: #2563eb;
            color: white;
            border: none;
            padding: 9px 13px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            margin-top: 14px;
        }

        .button-danger {
            background: #dc2626;
        }

        .button-secondary {
            background: #4b5563;
        }

        .list-item {
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 0;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .empty {
            color: #6b7280;
            font-style: italic;
        }

        .lesson-item {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 18px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .lesson-item:last-child {
            border-bottom: none;
        }

        .completed {
            color: #16a34a;
            font-weight: bold;
        }

        .not-completed {
            color: #dc2626;
            font-weight: bold;
        }

        @media (max-width: 1000px) {
            .sidebar {
                position: static;
                width: 100%;
            }

            .layout {
                display: block;
            }

            .main {
                margin-left: 0;
                width: 100%;
            }

            .stats,
            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="brand">Simple LMS</div>
        <div class="user-info">
            Student: {{ request.user.username }}
        </div>

        <nav class="menu">
            <a href="{% url 'student_dashboard' %}">Dashboard</a>
            <a href="{% url 'student_dashboard' %}#kelas-saya">Kelas Saya</a>
            <a href="{% url 'student_dashboard' %}#wishlist">Wishlist</a>
            <a href="{% url 'student_dashboard' %}#review">Review Saya</a>
            <a href="{% url 'student_dashboard' %}#course-tersedia">Course Tersedia</a>
        </nav>

        <div class="logout">
            <a href="/accounts/logout/">Logout</a>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            {% block topbar %}{% endblock %}
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

</body>
</html>
